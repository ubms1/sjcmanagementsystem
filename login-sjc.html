<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Jacinto Construction — Manager Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="login-page login-page-sjc">
    <div class="login-container">
        <div class="login-card login-card-sjc">

            <!-- Back to portal -->
            <a href="login.html" class="login-back">
                <i class="fas fa-arrow-left"></i> Back to Portal
            </a>

            <!-- Logo -->
            <div class="login-logos">
                <img src="San Jacinto Construction/SJC logo.jpg" alt="SJC" class="logo-round-lg"
                     onerror="this.style.display='none'">
            </div>

            <!-- Business badge -->
            <div class="login-badge-center">
                <span class="login-biz-badge login-biz-badge-sjc">
                    <i class="fas fa-hard-hat"></i> Construction Group
                </span>
            </div>

            <h1 class="login-title">San Jacinto Construction</h1>
            <p class="login-subtitle">Construction &bull; Subdivision &bull; Aggregates &bull; Commercial</p>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
                <div id="loginError" class="login-error hidden"></div>
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your username"
                           required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="pw-input-wrap">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password"
                               required autocomplete="current-password">
                        <button type="button" class="pw-toggle-btn" onclick="togglePw()" title="Show/Hide password">
                            <i class="fas fa-eye" id="pwIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login-sjc btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login to SJC Portal
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2025 San Jacinto Construction &amp; Group of Companies</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        Database.init();
        const _s = JSON.parse(localStorage.getItem('sjc_ubms_session'));
        if (_s && _s.isLoggedIn) window.location.href = 'index.html';

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errEl    = document.getElementById('loginError');
            const btn      = e.target.querySelector('button[type="submit"]');
            errEl.classList.add('hidden');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in…'; }

            const result = await Auth.login(username, password, 'sjc');
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to SJC Portal'; }
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errEl.textContent = result.error || 'Login failed. Please check your credentials.';
                errEl.classList.remove('hidden');
            }
        }

        function togglePw() {
            const pw   = document.getElementById('password');
            const icon = document.getElementById('pwIcon');
            if (pw.type === 'password') {
                pw.type    = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                pw.type    = 'password';
                icon.className = 'fas fa-eye';
            }
        }
    </script>
</body>
</html>
